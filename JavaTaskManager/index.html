<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Task Orbit</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700;800&family=Fraunces:opsz,wght@9..144,700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="bg-orb bg-orb-one" aria-hidden="true"></div>
  <div class="bg-orb bg-orb-two" aria-hidden="true"></div>

  <main class="app-shell">
    <header class="hero">
      <p class="eyebrow">Task Orbit</p>
      <h1>Track your day, one clear move at a time.</h1>
      <p class="subtext">A lightweight task manager with instant updates and local storage.</p>
    </header>

    <section class="panel" aria-label="Task manager">
      <form id="task-form" class="task-form">
        <label for="task-input" class="sr-only">Task name</label>
        <input id="task-input" name="task" type="text" maxlength="120" placeholder="What needs to get done?" autocomplete="off" required />
        <button type="submit">Add Task</button>
      </form>

      <div class="toolbar">
        <p id="stats" class="stats">0 tasks · 0 done</p>
        <button id="clear-done" class="ghost" type="button">Clear Done</button>
      </div>

      <ul id="task-list" class="task-list" aria-live="polite"></ul>
      <p id="empty-state" class="empty-state">No tasks yet. Add your first one above.</p>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
